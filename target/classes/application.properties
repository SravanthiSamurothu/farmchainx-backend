# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

app.jwt-secret=farmchainx-super-secret-key-2024-do-not-share
app.jwt-expiration-ms=86400000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=farmchainx-super-secret-key-change-this-in-production-2024
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://farmchainx-production-3250.up.railway.app

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.farmchainx=DEBUG
logging.level.org.springframework.security=INFO